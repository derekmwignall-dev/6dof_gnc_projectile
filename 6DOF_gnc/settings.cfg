# ============================================================
# Engagement: Short-range SAM vs fast maneuvering aircraft
# Missile analog: AIM-120C (AMRAAM)
# Target analog: F/A-18 at high subsonic, 4g evasive break
# Units: imperial (ft, lb, slugs, ft/s)
# ============================================================

# Initial conditions
# Missile launched from origin, target approaching head-on at 35,000 ft altitude
# Offset 500 ft in Y to create non-trivial LOS geometry
missile_pos   0.0       0.0      10000.0
missile_vel   4400.0    88.0      0.0
target_pos    25000.0   500.0    10000.0
target_vel    -1500.0   0.0      0.0
target_acc    0.0       50.74   0.0

# Guidance
nav_constant  4.0

# Simulation
dt            0.001
num_steps     100000

# Kalman filter initial uncertainty
sigma_pos     100.0
sigma_vel     15.0
sigma_acc     10.0

# Physical properties (AIM-120C analog)
weight        10.41
drag_coeff    0.3
length        12.0
diameter      0.583

# Autopilot
Kp_att        50.0
Kd_att        14.0
Kp_spd        20.0
V_cmd         4400.0
T_max         15000.0

# Monte Carlo
mc_runs       500
mc_sigma_pos  100.0
mc_sigma_vel  25.0

# Radar/Seeker parameters (X-band analog, ~10 GHz)
radar_power       500.0
radar_gain        3000.0
radar_wavelength  0.0984
radar_bandwidth   1e6
radar_noise_fig   3.0
noise_temp        290.0